services:
  # ============== System of record: SQL Server historian ==============
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-StrongPassw0rd!}
      # SQL Server Agent runs the CDC capture/cleanup jobs — required.
      MSSQL_AGENT_ENABLED: "true"
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -b -o /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # One-shot: creates the ups database, schemas/tables, the materialize
  # login, and enables CDC on every replicated table.
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      MSSQL_HOST: sqlserver
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-StrongPassw0rd!}
      MZ_SQLSERVER_PASSWORD: ${MZ_SQLSERVER_PASSWORD:-MzPassw0rd!}
    volumes:
      - ./db/sqlserver:/scripts:ro
    entrypoint: ["/bin/bash", "/scripts/init.sh"]
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"

  # Writes historian samples, package scans, and fleet telemetry into SQL
  # Server continuously. Started before materialize-init on purpose: an
  # idle SQL Server CDC stream only notifies consumers every 5 minutes, so
  # live writes keep the Materialize snapshot fast.
  simulator:
    build:
      context: ./simulator
    environment:
      MSSQL_HOST: sqlserver
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-StrongPassw0rd!}
    ports:
      - "${SIM_CONTROL_PORT:-8085}:8085"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8085/health')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  # ============== Materialize: the live context graph ==============
  mz:
    image: materialize/materialized:v26.24.0-dev.0--pr.g04fbfbd60143e627d4be9746fc09a8d7aa002322
    restart: unless-stopped
    command: >
      --system-parameter-default=default_timestamp_interval=100ms
      --system-parameter-default=min_timestamp_interval=100ms
      --system-parameter-default=max_timestamp_interval=100ms
    ports:
      - "${MZ_CONSOLE_PORT:-6874}:6874"  # Admin console
      - "${MZ_PORT:-6875}:6875"          # SQL interface
      - "6876:6876"
      - "6877:6877"                      # mz_system SQL interface
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6874/"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  # One-shot: clusters, SQL Server connection + source, silver/gold views,
  # serving indexes.
  materialize-init:
    image: postgres:15-alpine
    environment:
      MZ_HOST: mz
      MZ_PORT: 6875
      MZ_SQLSERVER_PASSWORD: ${MZ_SQLSERVER_PASSWORD:-MzPassw0rd!}
    volumes:
      - ./db/materialize/init.sh:/init.sh:ro
    command: sh -c "/init.sh"
    depends_on:
      mz:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
      simulator:
        condition: service_healthy
    restart: "no"

  # ============== Serving layer ==============
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      MZ_HOST: mz
      MZ_PORT: 6875
      MZ_USER: materialize
      MZ_DATABASE: materialize
      SIMULATOR_URL: http://simulator:8085
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      materialize-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  agents:
    build:
      context: ./agents
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-}
      API_BASE_URL: http://api:8080
      MZ_HOST: mz
      MZ_PORT: 6875
      MZ_USER: materialize
      MZ_DATABASE: materialize
      MSSQL_HOST: sqlserver
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-StrongPassw0rd!}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${AGENT_PORT:-8081}:8081"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
      VITE_AGENT_URL: ${VITE_AGENT_URL:-http://localhost:8081}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlserver_data:
